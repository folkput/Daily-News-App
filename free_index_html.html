const RSS_PROXY = "https://api.allorigins.win/get?url="; // free CORS proxy for RSS

// ── GNEWS FETCH ───────────────────────────────────────────────────────────────
async function fetchGNews(query, lang = "en", max = 6) {
  if (!GNEWS_KEY || GNEWS_KEY === "PASTE_YOUR_GNEWS_KEY_HERE") return [];
  try {
    const url = `https://gnews.io/api/v4/search?q=${encodeURIComponent(query)}&lang=${lang}&max=${max}&sortby=publishedAt&apikey=${GNEWS_KEY}`;
    const r = await fetch(url);
    const d = await r.json();
    return d.articles || [];
  } catch { return []; }
}

async function fetchGNewsTop(country, max = 6) {
  if (!GNEWS_KEY || GNEWS_KEY === "PASTE_YOUR_GNEWS_KEY_HERE") return [];
  try {
    const url = `https://gnews.io/api/v4/top-headlines?country=${country}&max=${max}&apikey=${GNEWS_KEY}`;
    const r = await fetch(url);
    const d = await r.json();
    return d.articles || [];
  } catch { return []; }
}

// ── RSS FEED FETCH (free, no key needed) ─────────────────────────────────────
async function fetchRSS(feedUrl, max = 5) {
  try {
    const r = await fetch(RSS_PROXY + encodeURIComponent(feedUrl));
    const d = await r.json();
    const parser = new DOMParser();
    const xml = parser.parseFromString(d.contents, "text/xml");
    const items = Array.from(xml.querySelectorAll("item")).slice(0, max);
    return items.map(item => ({
      title: item.querySelector("title")?.textContent || "",
      description: item.querySelector("description")?.textContent?.replace(/<[^>]*>/g, "").slice(0, 200) || "",
      url: item.querySelector("link")?.textContent || "",
      source: { name: new URL(feedUrl).hostname.replace("www.", "") },
      publishedAt: item.querySelector("pubDate")?.textContent || new Date().toISOString(),
      urlToImage: null,
    }));
  } catch { return []; }
}

// ── MAIN DATA FETCHER ─────────────────────────────────────────────────────────
async function fetchAllNews() {
  const useGNews = GNEWS_KEY && GNEWS_KEY !== "PASTE_YOUR_GNEWS_KEY_HERE";

  // Fire all requests in parallel
  const [
    thaiRSS, bizRSS, worldRSS, finRSS, techRSS, bbcRSS, bbcBizRSS, sportsRSS,
    gnewsTH, gnewsUS, gnewsWorld, gnewsStocks, gnewsCrucial,
  ] = await Promise.all([
    fetchRSS(RSS_FEEDS.thailand, 8),
    fetchRSS(RSS_FEEDS.business, 6),
    fetchRSS(RSS_FEEDS.world, 8),
    fetchRSS(RSS_FEEDS.finance, 6),
    fetchRSS(RSS_FEEDS.tech, 5),
    fetchRSS(RSS_FEEDS.bbcworld, 6),
    fetchRSS(RSS_FEEDS.bbcbusiness, 5),
    fetchRSS(RSS_FEEDS.sports, 5),
    useGNews ? fetchGNews("Thailand news today", "en", 5) : Promise.resolve([]),
    useGNews ? fetchGNewsTop("us", 5) : Promise.resolve([]),
    useGNews ? fetchGNews("global economy geopolitics", "en", 5) : Promise.resolve([]),
    useGNews ? fetchGNews("stock market SET NYSE today", "en", 5) : Promise.resolve([]),
    useGNews ? fetchGNews("Thailand flood transport safety alert", "en", 4) : Promise.resolve([]),
  ]);

  // Convert GNews article → unified format
  const g2u = (a, region, cat) => ({
    title: a.title, description: a.description || a.content || "",
    url: a.url, source: { name: a.source?.name || "GNews" },
    publishedAt: a.publishedAt, urlToImage: a.image,
    region, category: cat,
  });

  // Merge RSS → unified format
  const r2u = (a, region, cat) => ({ ...a, region, category: cat });

  return {
    briefing: buildBriefing([...thaiRSS, ...worldRSS, ...finRSS]),
    top: dedup([
      ...thaiRSS.slice(0,3).map(a=>r2u(a,"Thailand","Thailand")),
      ...worldRSS.slice(0,2).map(a=>r2u(a,"Global","World")),
      ...bbcRSS.slice(0,2).map(a=>r2u(a,"Global","World")),
      ...gnewsTH.slice(0,2).map(a=>g2u(a,"Thailand","Thailand")),
      ...gnewsUS.slice(0,2).map(a=>g2u(a,"USA","USA")),
      ...gnewsWorld.slice(0,1).map(a=>g2u(a,"Global","World")),
    ]).slice(0,8),
    stocks: dedup([
      ...finRSS.slice(0,4).map(a=>r2u(a,"Global","Finance")),
      ...bizRSS.slice(0,3).map(a=>r2u(a,"Thailand","Business")),
      ...gnewsStocks.slice(0,4).map(a=>g2u(a,"Global","Markets")),
    ]).slice(0,8),
    macro: dedup([
      ...finRSS.map(a=>r2u(a,"Global","Economics")),
      ...bbcBizRSS.map(a=>r2u(a,"Global","Economics")),
      ...gnewsWorld.slice(0,3).map(a=>g2u(a,"Global","Economics")),
    ]).slice(0,6),
    micro: dedup([
      ...bizRSS.map(a=>r2u(a,"Thailand","Business")),
      ...techRSS.map(a=>r2u(a,"Global","Tech")),
    ]).slice(0,6),
    crucial: dedup([
      ...thaiRSS.slice(0,3).map(a=>r2u(a,"Thailand","Thailand")),
      ...gnewsCrucial.map(a=>g2u(a,"Thailand","Alert")),
      ...bbcRSS.slice(0,2).map(a=>r2u(a,"Global","World")),
    ]).slice(0,7),
    breaking: dedup([
      ...worldRSS.slice(0,3).map(a=>r2u(a,"Global","Breaking")),
      ...gnewsUS.slice(0,2).map(a=>g2u(a,"USA","Breaking")),
    ]).slice(0,5),
    politics: dedup([
      ...thaiRSS.filter(a=>/politi|govern|minister|parliament|election/i.test(a.title)).slice(0,2).map(a=>r2u(a,"Thailand","Politics")),
      ...worldRSS.filter(a=>/politi|diplomat|treaty|election|president|prime/i.test(a.title)).slice(0,3).map(a=>r2u(a,"Global","Politics")),
    ]).slice(0,5),
    business: dedup([
      ...bizRSS.slice(0,3).map(a=>r2u(a,"Thailand","Business")),
      ...finRSS.filter(a=>/earn|profit|revenue|IPO|merger/i.test(a.title)).slice(0,3).map(a=>r2u(a,"Global","Business")),
    ]).slice(0,5),
    investigate: dedup([
      ...thaiRSS.filter(a=>/corrupt|investig|probe|fraud|scandal/i.test(a.title)).slice(0,2).map(a=>r2u(a,"Thailand","Investigative")),
      ...worldRSS.filter(a=>/corrupt|investig|probe|fraud|scandal/i.test(a.title)).slice(0,2).map(a=>r2u(a,"Global","Investigative")),
    ]).slice(0,4),
    crime: dedup([
      ...thaiRSS.filter(a=>/crime|arrest|police|court|murder|drug|scam/i.test(a.title)).slice(0,3).map(a=>r2u(a,"Thailand","Crime")),
      ...worldRSS.filter(a=>/crime|arrest|court|murder|terror/i.test(a.title)).slice(0,2).map(a=>r2u(a,"Global","Crime")),
    ]).slice(0,5),
    lifestyle: dedup([
      ...thaiRSS.filter(a=>/food|travel|health|lifestyle|baht|exchange|weather|festival/i.test(a.title)).slice(0,3).map(a=>r2u(a,"Thailand","Lifestyle")),
    ]).slice(0,4),
    entertainment: dedup([
      ...thaiRSS.filter(a=>/entertain|celebrity|film|music|concert|festival/i.test(a.title)).slice(0,2).map(a=>r2u(a,"Thailand","Entertainment")),
      ...gnewsWorld.filter(a=>/entertain|celebrity|film|music|award/i.test(a.title)).slice(0,2).map(a=>g2u(a,"Global","Entertainment")),
    ]).slice(0,4),
    sports: dedup([
      ...sportsRSS.slice(0,4).map(a=>r2u(a,"Thailand","Sports")),
      ...worldRSS.filter(a=>/sport|football|soccer|NBA|tennis|golf|olympic/i.test(a.title)).slice(0,2).map(a=>r2u(a,"Global","Sports")),
    ]).slice(0,5),
    humaninterest: dedup([
      ...thaiRSS.filter(a=>/hero|kind|inspir|amazing|record|young|student|volunteer/i.test(a.title)).slice(0,2).map(a=>r2u(a,"Thailand","Human Interest")),
      ...worldRSS.filter(a=>/hero|kind|inspir|amazing|record|discovery|rescued/i.test(a.title)).slice(0,2).map(a=>r2u(a,"Global","Human Interest")),
    ]).slice(0,4),
  };
}

function dedup(articles) {
  const seen = new Set();
  return articles.filter(a => {
    const k = (a.title || "").slice(0, 60).toLowerCase();
    if (seen.has(k)) return false;
    seen.add(k); return true;
  });
}

function buildBriefing(articles) {
  if (!articles.length) return "Loading latest news…";
  const top = articles.slice(0, 5).map(a => a.title).join(". ");
  return `Daily News briefing for ${new Date().toDateString()}. Here are today's top stories: ${top}. Stay informed with the latest from Thailand and around the world.`;
}

function timeAgo(dateStr) {
  if (!dateStr) return "";
  try {
    const diff = Date.now() - new Date(dateStr).getTime();
    const m = Math.floor(diff / 60000);
    if (m < 60) return `${m}m ago`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h}h ago`;
    return `${Math.floor(h / 24)}d ago`;
  } catch { return ""; }
}

function usePersistedState(key, def) {
  const [val, setVal] = useState(() => { try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : def; } catch { return def; } });
  const set = useCallback(v => { setVal(v); try { localStorage.setItem(key, JSON.stringify(v)); } catch {} }, [key]);
  return [val, set];
}

function useTTS(voiceGender) {
  const [speaking, setSpeaking] = useState(false);
  const [paused, setPaused] = useState(false);
  const [activeId, setActiveId] = useState(null);
  const stop = useCallback(() => { window.speechSynthesis.cancel(); setSpeaking(false); setPaused(false); setActiveId(null); }, []);
  const getVoice = useCallback(() => {
    const v = window.speechSynthesis.getVoices();
    return voiceGender === "female"
      ? v.find(x => /samantha|karen|victoria|zira|moira/i.test(x.name)) || v.find(x => x.lang.startsWith("en"))
      : v.find(x => /daniel|alex|fred|arthur/i.test(x.name)) || v.find(x => x.lang.startsWith("en"));
  }, [voiceGender]);
  const speak = useCallback((text, id) => {
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.rate = 0.88; utt.pitch = voiceGender === "female" ? 1.1 : 0.9; utt.lang = "en-US";
    const voice = getVoice(); if (voice) utt.voice = voice;
    utt.onstart = () => { setSpeaking(true); setPaused(false); setActiveId(id); };
    utt.onend = () => { setSpeaking(false); setPaused(false); setActiveId(null); };
    utt.onerror = () => { setSpeaking(false); setPaused(false); setActiveId(null); };
    window.speechSynthesis.speak(utt);
  }, [getVoice, voiceGender]);
  const toggle = useCallback((text, id) => {
    if (activeId === id) { if (paused) { window.speechSynthesis.resume(); setPaused(false); } else { window.speechSynthesis.pause(); setPaused(true); } }
    else speak(text, id);
  }, [activeId, paused, speak]);
  useEffect(() => () => window.speechSynthesis.cancel(), []);
  return { speaking, paused, activeId, speak, toggle, stop };
}

function useCountdown(ms) {
  const [r, setR] = useState(0);
  useEffect(() => {
    const tick = () => setR(Math.max(0, ms - Date.now()));
    tick(); const id = setInterval(tick, 1000); return () => clearInterval(id);
  }, [ms]);
  return r;
}
function fmt(ms) {
  if (ms <= 0) return "now";
  const h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000), s = Math.floor((ms%60000)/1000);
  return h > 0 ? `${h}h ${m}m` : m > 0 ? `${m}m ${s}s` : `${s}s`;
}

const Badge = ({label, style}) => <span style={{fontSize:10,padding:"2px 8px",borderRadius:20,fontWeight:500,whiteSpace:"nowrap",...style}}>{label}</span>;

function SpeakBtn({text, id, tts, size="sm", T}) {
  const isActive=tts.activeId===id, isPaused=isActive&&tts.paused, isPlaying=isActive&&!tts.paused;
  return <button onClick={()=>tts.toggle(text,id)} style={{fontSize:size==="lg"?13:11,padding:size==="lg"?"6px 14px":"3px 9px",borderRadius:20,background:isActive?T.tabActive:"transparent",color:isActive?T.accent:T.sub,border:`1px solid ${isActive?T.tabActiveBorder:T.border}`,fontFamily:"inherit",display:"inline-flex",alignItems:"center",gap:4,whiteSpace:"nowrap",transition:"all 0.2s"}}>
    {isPlaying?"⏸":isPaused?"▶":"🔊"}{size==="lg"&&(isPlaying?" Pause":isPaused?" Resume":" Listen")}
  </button>;
}

  const id = "c_"+(item.title||"").slice(0,35).replace(/\W/g,"_");
  const rc = REGION_COLORS[item.region] || REGION_COLORS.Global;
  const isActive = tts.activeId === id;
  const speakText = `${item.title}. ${item.description||""}. Source: ${item.source?.name||""}`;
  const ago = timeAgo(item.publishedAt);
  return <div className="card-in" style={{background:T.card,border:`1px solid ${isActive?T.tabActiveBorder:T.border}`,borderRadius:12,padding:"14px 16px",marginBottom:8,transition:"border 0.2s"}}>
    <div style={{display:"flex",justifyContent:"space-between",gap:8,marginBottom:8}}>
      <div style={{display:"flex",gap:5,flexWrap:"wrap",flex:1}}>
        <Badge label={item.region||"Global"} style={{background:rc.bg,color:rc.color}}/>
        {item.category&&<Badge label={item.category} style={{background:T.bg,color:T.sub,border:`1px solid ${T.border}`}}/>}
        {ago&&<Badge label={ago} style={{background:T.bg,color:T.sub,border:`1px solid ${T.border}`}}/>}
      </div>
      <SpeakBtn text={speakText} id={id} tts={tts} T={T}/>
    </div>
    <p style={{fontWeight:600,fontSize:14,margin:"0 0 5px",color:T.text,lineHeight:1.45}}>{item.title}</p>
    {item.description&&<p style={{fontSize:13,color:T.sub,margin:"0 0 8px",lineHeight:1.7}}>{item.description}</p>}
    <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
      <span style={{fontSize:11,color:T.sub}}>Source: <strong style={{color:T.text}}>{item.source?.name||"Unknown"}</strong></span>

}

    <div style={{display:"flex",gap:8,marginBottom:22}}>
      {[["en","🇬🇧 English"],["th","🇹🇭 ภาษาไทย"]].map(([l,label])=>(
        <button key={l} onClick={()=>setLang(l)} style={{flex:1,padding:"9px 12px",borderRadius:10,border:`1.5px solid ${lang===l?T.accent:T.border}`,background:lang===l?T.tabActive:T.bg,fontFamily:"inherit",fontSize:13,color:lang===l?T.accent:T.sub,fontWeight:lang===l?700:400}}>{label}</button>
      ))}
    </div>
    <p style={{fontSize:11,fontWeight:700,color:T.sub,textTransform:"uppercase",letterSpacing:"0.08em",margin:"0 0 8px"}}>Background Theme</p>
    <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:22}}>
      {Object.entries(THEMES).map(([k,th])=>(
        <button key={k} onClick={()=>setThemeKey(k)} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:10,border:`1.5px solid ${themeKey===k?T.accent:T.border}`,background:themeKey===k?T.tabActive:th.bg,fontFamily:"inherit"}}>
          <span style={{width:18,height:18,borderRadius:"50%",background:th.bg,border:`2px solid ${th.border}`,display:"inline-block",flexShrink:0}}/>
          <span style={{fontSize:13,color:themeKey===k?T.accent:T.sub,fontWeight:themeKey===k?600:400}}>{lang==="th"?th.nameTH:th.name}</span>
          {themeKey===k&&<span style={{marginLeft:"auto",color:T.accent}}>✓</span>}
        </button>
      ))}
    </div>
    <p style={{fontSize:11,fontWeight:700,color:T.sub,textTransform:"uppercase",letterSpacing:"0.08em",margin:"0 0 8px"}}>Reader Voice</p>
    <div style={{display:"flex",gap:8,marginBottom:16}}>
      {[["female","👩 Female"],["male","👨 Male"]].map(([g,label])=>(
        <button key={g} onClick={()=>setVoiceGender(g)} style={{flex:1,padding:"9px 12px",borderRadius:10,border:`1.5px solid ${voiceGender===g?T.accent:T.border}`,background:voiceGender===g?T.tabActive:T.bg,fontFamily:"inherit",fontSize:13,color:voiceGender===g?T.accent:T.sub,fontWeight:voiceGender===g?600:400}}>{label}</button>
      ))}
    </div>
    <div style={{padding:"10px 12px",background:T.bg,borderRadius:8,fontSize:12,color:T.sub,lineHeight:1.6}}>
      <p style={{margin:"0 0 4px",fontWeight:600,color:T.text}}>💰 100% Free Sources</p>
      <p style={{margin:0}}>Bangkok Post RSS · Reuters RSS · BBC RSS · GNews API (free tier)</p>
    </div>
  </div>;
}

const PR_SUBS = [
  {id:"breaking",label:"🔴 Breaking",type:"hard"},{id:"politics",label:"🏛️ Politics",type:"hard"},
  {id:"business",label:"💼 Business",type:"hard"},{id:"investigate",label:"🕵️ Investigative",type:"hard"},
  {id:"crime",label:"⚖️ Crime & Justice",type:"hard"},{id:"lifestyle",label:"🍜 Lifestyle",type:"soft"},
  {id:"entertainment",label:"🎬 Entertainment",type:"soft"},{id:"sports",label:"🏆 Sports",type:"soft"},
  {id:"humaninterest",label:"💛 Human Interest",type:"soft"},
];
const TABS = [
  {id:"briefing",en:"☀️ Briefing",th:"☀️ สรุปข่าว"},
  {id:"top",en:"📰 Top News",th:"📰 ข่าวเด่น"},
  {id:"stocks",en:"📈 Stocks",th:"📈 หุ้น"},
  {id:"economics",en:"🌐 Economics",th:"🌐 เศรษฐกิจ"},
  {id:"crucial",en:"⚡ Crucial",th:"⚡ ด่วน"},
  {id:"reporter",en:"🎙️ Reporter",th:"🎙️ นักข่าว"},
];
const REGIONS = {en:["All","Thailand","USA","Global"],th:["ทั้งหมด","ไทย","สหรัฐฯ","โลก"]};
const matchRegion = (item, f) => {
  if (f==="All"||f==="ทั้งหมด") return true;
  const r = item.region||"Global";
  if (f==="Thailand"||f==="ไทย") return r==="Thailand";
  if (f==="USA"||f==="สหรัฐฯ") return r==="USA";
  return ["Global","Both","China","Asia","Europe"].includes(r);
};

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("briefing");
  const [rf, setRf] = usePersistedState("dn_rf","All");
  const [prSub, setPrSub] = useState("breaking");
  const [ecoSub, setEcoSub] = useState("macro");
  const [themeKey, setThemeKey] = usePersistedState("dn_theme","default");
  const [voiceGender, setVoiceGender] = usePersistedState("dn_voice","female");
  const [lang, setLang] = usePersistedState("dn_lang","en");
  const [showSettings, setShowSettings] = useState(false);
  const [lastUpdated, setLastUpdated] = usePersistedState("dn_updated", Date.now());
  const [nextRefresh, setNextRefresh] = usePersistedState("dn_next_refresh", Date.now()+AUTO_REFRESH_MS);
  const T = THEMES[themeKey]||THEMES.default;
  const tts = useTTS(voiceGender);
  const countdown = useCountdown(nextRefresh);
  const [news, setNews] = useState({});
  const [loading, setLoading] = useState(false);
  const noKey = !GNEWS_KEY || GNEWS_KEY === "PASTE_YOUR_GNEWS_KEY_HERE";

  const doRefresh = useCallback(async () => {
    tts.stop(); setLoading(true);
    const data = await fetchAllNews();
    setNews(data);
    const now = Date.now();
    setLastUpdated(now); setNextRefresh(now+AUTO_REFRESH_MS); setLoading(false);
  }, [tts]);

  useEffect(()=>{ doRefresh(); },[]);
  useEffect(()=>{
    const id=setInterval(()=>{ if(Date.now()>=nextRefresh) doRefresh(); },60000);
    return ()=>clearInterval(id);
  },[nextRefresh,doRefresh]);

  const getFiltered = key => {
    const items = news[key];
    if (!Array.isArray(items)) return null;
    return items.filter(i => matchRegion(i, rf));
  };

  const tabBtn = id => ({whiteSpace:"nowrap",fontSize:13,padding:"7px 15px",fontFamily:"inherit",background:tab===id?T.tabActive:"transparent",color:tab===id?T.tabActiveText:T.sub,border:`1px solid ${tab===id?T.tabActiveBorder:"transparent"}`,borderRadius:20,fontWeight:tab===id?600:400,transition:"all 0.2s"});
  const rfBtn = r => ({fontSize:12,padding:"5px 13px",borderRadius:20,fontFamily:"inherit",background:rf===r?T.tabActive:"transparent",color:rf===r?T.tabActiveText:T.sub,border:`1px solid ${rf===r?T.tabActiveBorder:T.border}`,fontWeight:rf===r?600:400,transition:"all 0.2s"});

  const Skels = () => <>{[1,2,3].map(i=><Skeleton key={i} T={T}/>)}</>;
  const Empty = () => <p style={{color:T.sub,padding:"1rem 0",fontSize:13}}>{lang==="th"?"ไม่มีรายการ":"No items found."}</p>;

  const renderSection = (key, name) => {
    if (loading) return <Skels/>;
    const items = getFiltered(key);
    if (!items||!items.length) return <Empty/>;
    return <><ReadAllBar tts={tts} items={items} name={name} sid={key} T={T}/>{items.map((s,i)=><NewsCard key={i} item={s} tts={tts} T={T}/>)}</>;
  };

  const renderContent = () => {
    if (tab==="briefing") {
      const raw = news.briefing, id="sec_briefing", isActive=tts.activeId===id;
      const topItems = getFiltered("top")||[];
      return <div>
        {noKey&&<div style={{padding:"10px 14px",background:"#FFFBEB",border:"1px solid #FDE68A",borderRadius:10,marginBottom:12,fontSize:12,color:"#78350F"}}>
          <strong>⚡ Optional boost:</strong> Add a free GNews API key to get more news sources. Get one at <a href="https://gnews.io" target="_blank" style={{color:"#92400E"}}>gnews.io</a> — 100 requests/day, no credit card. RSS feeds are working without it.
        </div>}
        {loading?<Skels/>:!raw?<div style={{textAlign:"center",padding:"2rem"}}><button onClick={doRefresh} style={{padding:"8px 20px",borderRadius:20,background:T.tabActive,color:T.tabActiveText,border:`1px solid ${T.tabActiveBorder}`,fontFamily:"inherit",fontSize:13,fontWeight:600}}>Load News</button></div>:(
          <>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,padding:"9px 13px",background:isActive?T.tabActive:T.bg,border:`1px solid ${isActive?T.tabActiveBorder:T.border}`,borderRadius:10}}>
              <span style={{fontSize:12,color:T.sub,flex:1}}>{isActive&&!tts.paused?"🔊 Reading…":isActive&&tts.paused?"⏸ Paused":"🔊 Listen to briefing"}</span>
              <SpeakBtn text={raw} id={id} tts={tts} size="lg" T={T}/>
              {tts.activeId&&<button onClick={tts.stop} style={{fontSize:11,padding:"3px 9px",borderRadius:20,background:"#FEF2F2",color:"#B91C1C",border:"1px solid #FCA5A5",fontFamily:"inherit"}}>■ Stop</button>}
            </div>
            <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:12,padding:"16px 18px",fontSize:14,lineHeight:1.9,color:T.text,marginBottom:10}}>{raw}</div>
            {topItems.slice(0,3).map((item,i)=><NewsCard key={i} item={item} tts={tts} T={T}/>)}
          </>
        )}
      </div>;
    }
    if (tab==="top") return <div><InfoDrop title="ℹ️ Top News — sources" T={T}><p>Live headlines from Bangkok Post, Reuters, BBC, and GNews. Auto-refreshes every 4 hours.</p></InfoDrop>{renderSection("top","Top News")}</div>;
    if (tab==="stocks") return <div>
      <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
        {[["🇹🇭 Thailand","#FEF3E2","#92400E"],["🇺🇸 USA / Global","#F0FDF4","#166534"],["📊 Finance","#EFF6FF","#1D4ED8"]].map(([l,bg,c])=>(
          <div key={l} style={{background:bg,borderRadius:10,padding:"7px 12px",flex:1,minWidth:90,textAlign:"center"}}>
            <p style={{margin:0,fontSize:11,color:c,fontWeight:600}}>{l}</p>
          </div>
        ))}
      </div>
      {renderSection("stocks","Stocks & Finance")}
    </div>;
    if (tab==="economics") return <div>
      <div style={{display:"flex",gap:6,marginBottom:12}}>
        {[["macro",lang==="th"?"📊 เศรษฐกิจมหภาค":"📊 Macroeconomics"],["micro",lang==="th"?"🏭 เศรษฐกิจจุลภาค":"🏭 Microeconomics"]].map(([k,l])=>(
          <button key={k} onClick={()=>setEcoSub(k)} style={{flex:1,padding:"8px 12px",borderRadius:10,fontFamily:"inherit",fontSize:13,fontWeight:ecoSub===k?600:400,background:ecoSub===k?T.tabActive:T.bg,color:ecoSub===k?T.tabActiveText:T.sub,border:`1px solid ${ecoSub===k?T.tabActiveBorder:T.border}`,transition:"all 0.2s"}}>{l}</button>
        ))}
      </div>
      {renderSection(ecoSub==="macro"?"macro":"micro", ecoSub==="macro"?"Macroeconomics":"Microeconomics")}
    </div>;
    if (tab==="crucial") {
      const items = getFiltered("crucial");
      return <div>
        {loading?<Skels/>:!items||!items.length?<Empty/>:(
          <><ReadAllBar tts={tts} items={items} name="Crucial" sid="crucial" T={T}/>{items.map((s,i)=><NewsCard key={i} item={s} tts={tts} T={T}/>)}</>
        )}
      </div>;
    }
    if (tab==="reporter") {
      return <div>
        <div style={{marginBottom:12}}>
          <p style={{fontSize:11,fontWeight:700,color:"#B91C1C",textTransform:"uppercase",letterSpacing:"0.06em",margin:"0 0 6px"}}>📰 Hard News</p>
          <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:10}}>
            {PR_SUBS.filter(s=>s.type==="hard").map(s=>(
              <button key={s.id} onClick={()=>setPrSub(s.id)} style={{fontSize:12,padding:"5px 11px",borderRadius:20,fontFamily:"inherit",background:prSub===s.id?"#FEF2F2":T.bg,color:prSub===s.id?"#B91C1C":T.sub,border:`1px solid ${prSub===s.id?"#FECACA":T.border}`,fontWeight:prSub===s.id?600:400,transition:"all 0.2s"}}>{s.label}</button>
            ))}
          </div>
          <p style={{fontSize:11,fontWeight:700,color:T.accent,textTransform:"uppercase",letterSpacing:"0.06em",margin:"0 0 6px"}}>🌟 Soft News</p>
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            {PR_SUBS.filter(s=>s.type==="soft").map(s=>(
              <button key={s.id} onClick={()=>setPrSub(s.id)} style={{fontSize:12,padding:"5px 11px",borderRadius:20,fontFamily:"inherit",background:prSub===s.id?T.tabActive:T.bg,color:prSub===s.id?T.tabActiveText:T.sub,border:`1px solid ${prSub===s.id?T.tabActiveBorder:T.border}`,fontWeight:prSub===s.id?600:400,transition:"all 0.2s"}}>{s.label}</button>
            ))}
          </div>
        </div>
        {renderSection(prSub, PR_SUBS.find(s=>s.id===prSub)?.label||prSub)}
      </div>;
    }
  };

  const lastStr = lastUpdated ? new Date(lastUpdated).toLocaleTimeString(lang==="th"?"th-TH":"en-GB",{hour:"2-digit",minute:"2-digit"}) : "";

  return <div style={{minHeight:"100vh",background:T.bg,fontFamily:"'Inter',-apple-system,sans-serif",padding:"0 0 40px"}}>
    {showSettings&&<div onClick={()=>setShowSettings(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.15)",zIndex:99}}/>}
    {showSettings&&<SettingsPanel T={T} themeKey={themeKey} setThemeKey={setThemeKey} voiceGender={voiceGender} setVoiceGender={setVoiceGender} lang={lang} setLang={setLang} onClose={()=>setShowSettings(false)}/>}

    <div style={{maxWidth:680,margin:"0 auto",padding:"0 16px"}}>
      <div style={{padding:"18px 0 14px",borderBottom:`1px solid ${T.border}`,marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
          <div>
            <h1 style={{margin:0,fontSize:22,fontWeight:700,color:T.text,letterSpacing:"-0.02em"}}>{lang==="th"?"ข่าวประจำวัน":"Daily News"}</h1>
            <p style={{margin:"3px 0 0",fontSize:12,color:T.sub}}>{new Date().toLocaleDateString(lang==="th"?"th-TH":"en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</p>
            <div style={{display:"flex",alignItems:"center",gap:10,marginTop:4,flexWrap:"wrap"}}>
              {lastStr&&<span style={{fontSize:11,color:T.sub}}>{lang==="th"?"อัปเดตเมื่อ":"Updated"} {lastStr}</span>}
              <span style={{fontSize:11,color:T.sub,display:"flex",alignItems:"center",gap:4}}>
                <span style={{width:6,height:6,borderRadius:"50%",background:countdown<300000?"#EF4444":countdown<900000?"#F59E0B":"#22C55E",display:"inline-block"}}/>
                {lang==="th"?"รีเฟรชใน":"Refresh in"} <strong style={{color:T.text}}>{fmt(countdown)}</strong>
              </span>
              <span style={{fontSize:11,background:"#F0FDF4",color:"#166534",padding:"2px 8px",borderRadius:20,border:"1px solid #86EFAC",fontWeight:500}}>✅ 100% Free</span>
            </div>
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",justifyContent:"flex-end"}}>
            <button onClick={doRefresh} disabled={loading} style={{fontSize:12,padding:"6px 12px",borderRadius:20,fontFamily:"inherit",background:loading?T.tabActive:T.card,color:loading?T.accent:T.sub,border:`1px solid ${loading?T.tabActiveBorder:T.border}`,fontWeight:500,display:"flex",alignItems:"center",gap:5}}>
              {loading?<><span style={{display:"inline-block",animation:"spin 0.8s linear infinite"}}>⟳</span> Loading…</>:<>↻ Refresh</>}
            </button>
            <button onClick={()=>tts.toggle(news.briefing||"No content.","ALL")} style={{fontSize:12,padding:"6px 12px",borderRadius:20,fontFamily:"inherit",background:tts.activeId==="ALL"?T.tabActive:T.card,color:tts.activeId==="ALL"?T.tabActiveText:T.sub,border:`1px solid ${tts.activeId==="ALL"?T.tabActiveBorder:T.border}`,fontWeight:500,display:"flex",alignItems:"center",gap:5}}>
              {tts.activeId==="ALL"&&!tts.paused?"⏸ Pause":tts.activeId==="ALL"&&tts.paused?"▶ Resume":"🔊 Read All"}
            </button>
            {tts.speaking&&<button onClick={tts.stop} style={{fontSize:12,padding:"6px 10px",borderRadius:20,background:"#FEF2F2",color:"#B91C1C",border:"1px solid #FECACA",fontFamily:"inherit"}}>■</button>}
            <button onClick={()=>setShowSettings(s=>!s)} style={{fontSize:15,padding:"5px 8px",borderRadius:10,background:showSettings?T.tabActive:"transparent",border:`1px solid ${showSettings?T.tabActiveBorder:T.border}`,color:T.sub}}>⚙️</button>
          </div>
        </div>
      </div>

      <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:"12px 14px",marginBottom:16}}>
        <p style={{fontSize:10,fontWeight:700,color:T.sub,textTransform:"uppercase",letterSpacing:"0.08em",margin:"0 0 8px"}}>{lang==="th"?"กรองตามภูมิภาค":"Region Filter"}</p>
        <div style={{display:"flex",gap:5,marginBottom:12,flexWrap:"wrap"}}>
          {REGIONS[lang].map(r=>(
            <button key={r} onClick={()=>setRf(r)} style={rfBtn(r)}>
              {r==="Thailand"||r==="ไทย"?"🇹🇭 ":r==="USA"||r==="สหรัฐฯ"?"🇺🇸 ":r==="Global"||r==="โลก"?"🌐 ":""}{r}
            </button>
          ))}
        </div>
        <div style={{height:1,background:T.border,margin:"0 0 12px"}}/>
        <p style={{fontSize:10,fontWeight:700,color:T.sub,textTransform:"uppercase",letterSpacing:"0.08em",margin:"0 0 8px"}}>{lang==="th"?"หมวดหมู่":"Section"}</p>
        <div style={{display:"flex",gap:5,overflowX:"auto",paddingBottom:2}}>
          {TABS.map(t2=><button key={t2.id} onClick={()=>setTab(t2.id)} style={tabBtn(t2.id)}>{lang==="th"?t2.th:t2.en}</button>)}
        </div>
      </div>

      <div>{renderContent()}</div>

      <div style={{marginTop:20,padding:"10px 14px",background:T.card,border:`1px solid ${T.border}`,borderRadius:10}}>
        <p style={{margin:0,fontSize:11,color:T.sub,lineHeight:1.7}}>
          💰 <strong style={{color:T.text}}>100% Free</strong> — Bangkok Post RSS · Reuters RSS · BBC RSS · GNews (optional, free tier)<br/>
          🔄 Auto-refresh every 4h · 🔊 Tap cards to listen · ↗ Links open original articles · ⚙️ settings
        </p>
      </div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
